# CRD portfolio: static assets plus a small Worker for /api/enquiry.
# Email Routing (receiving/forwarding) and Email Sending (the enquiry email)
# are separate concerns — setup, sequencing and rollback are documented in
# docs/email-migration.md. Nothing in this file changes DNS.
name = "crd-portfolio"
compatibility_date = "2026-07-02"
main = "worker/index.ts"

[assets]
directory = "./artifacts/portfolio/dist/public"
not_found_handling = "single-page-application"
binding = "ASSETS"

# Enquiry emails go out through this binding. Free path: the recipient
# (CONTACT_INBOX) must be a verified destination address on the account.
[[send_email]]
name = "EMAIL"

[vars]
# Must match a verified Email Routing destination address for free sending.
CONTACT_INBOX = "chrisgara@gmail.com"
# From address on the site's own domain (requires Email Routing enabled on
# the zone so the domain is a verified sender).
ENQUIRY_FROM = "enquiries@christopherrobindesign.com"

# 5 submissions per minute per connecting IP.
[[ratelimits]]
name = "ENQUIRY_RATE"
namespace_id = "1001"
simple = { limit = 5, period = 60 }
